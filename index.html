<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Deployer Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17; --surface: #0f1623; --surface2: #151d2e; --border: #1e2d45;
            --accent: #00d4ff; --accent2: #7c3aed; --success: #00e5a0;
            --danger: #ff4757; --warn: #ffa502; --text: #c9d8f0; --text-dim: #4a6080;
            --font-mono: 'JetBrains Mono', monospace; --font-display: 'Syne', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-mono); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0;
        }
        .glow-blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
        .glow-blob-1 { width: 400px; height: 400px; background: rgba(0,212,255,0.06); top: -100px; left: -100px; animation: blob1 8s ease-in-out infinite alternate; }
        .glow-blob-2 { width: 300px; height: 300px; background: rgba(124,58,237,0.08); bottom: -50px; right: -50px; animation: blob2 10s ease-in-out infinite alternate; }
        @keyframes blob1 { to { transform: translate(60px, 40px); } }
        @keyframes blob2 { to { transform: translate(-40px, -60px); } }
        .wrapper { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 40px 20px 80px; }
        header { text-align: center; margin-bottom: 40px; animation: fadeDown 0.6s ease both; }
        .header-tag { display: inline-block; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); padding: 4px 12px; border-radius: 20px; margin-bottom: 16px; }
        h1 { font-family: var(--font-display); font-size: clamp(28px, 6vw, 42px); font-weight: 800; background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; margin-bottom: 8px; }
        .subtitle { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; animation: fadeUp 0.6s ease both 0.1s; box-shadow: 0 0 0 1px rgba(0,212,255,0.05), 0 20px 60px rgba(0,0,0,0.4); }
        .card-header { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
        .card-header-dots { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-r { background: #ff5f57; } .dot-y { background: #ffbd2e; } .dot-g { background: #28c840; }
        .card-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-left: 4px; flex: 1; }
        .card-body { padding: 28px 24px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
        .form-label-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 6px var(--accent); }

        /* Repo row dengan tombol refresh */
        .repo-row { display: flex; gap: 8px; align-items: stretch; }
        .repo-row select { flex: 1; }
        .btn-refresh {
            background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
            color: var(--accent); font-size: 16px; padding: 0 14px; cursor: pointer;
            transition: all 0.2s; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        }
        .btn-refresh:hover { background: rgba(0,212,255,0.1); border-color: var(--accent); }
        .btn-refresh.spinning { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        input[type="file"], select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: var(--text); font-family: var(--font-mono); font-size: 13px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
        select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
        select option { background: var(--surface2); }
        input[type="file"] { cursor: pointer; padding: 10px 14px; }
        input[type="file"]::file-selector-button { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--accent); font-family: var(--font-mono); font-size: 11px; padding: 5px 12px; cursor: pointer; margin-right: 12px; transition: background 0.2s; }
        input[type="file"]::file-selector-button:hover { background: rgba(0,212,255,0.1); }

        .btn { width: 100%; padding: 13px 20px; border-radius: 8px; border: none; font-family: var(--font-mono); font-size: 13px; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: all 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-deploy { background: linear-gradient(135deg, var(--success) 0%, #00b37a 100%); color: #0a0e17; margin-top: 8px; box-shadow: 0 4px 20px rgba(0,229,160,0.2); }
        .btn-deploy:hover:not(:disabled) { box-shadow: 0 4px 28px rgba(0,229,160,0.35); transform: translateY(-1px); }

        /* Status */
        .status-bar { display: flex; align-items: center; gap: 8px; font-size: 11px; margin-bottom: 20px; padding: 8px 12px; border-radius: 6px; }
        .status-bar.ok { color: var(--success); background: rgba(0,229,160,0.06); border: 1px solid rgba(0,229,160,0.15); }
        .status-bar.error { color: var(--danger); background: rgba(255,71,87,0.06); border: 1px solid rgba(255,71,87,0.2); }
        .status-bar.loading { color: var(--warn); background: rgba(255,165,2,0.06); border: 1px solid rgba(255,165,2,0.2); }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .status-bar.ok .status-dot { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
        .status-bar.error .status-dot { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .status-bar.loading .status-dot { background: var(--warn); box-shadow: 0 0 8px var(--warn); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Log */
        #log { display: none; margin-top: 24px; background: #050810; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .log-header { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 8px 14px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
        .log-dot { width: 6px; height: 6px; background: var(--warn); border-radius: 50%; animation: pulse 1.5s infinite; }
        #log-body { padding: 14px; font-size: 12px; height: 220px; overflow-y: auto; line-height: 1.7; }
        #log-body::-webkit-scrollbar { width: 4px; }
        #log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .log-line { display: flex; gap: 8px; }
        .log-prefix { color: var(--text-dim); flex-shrink: 0; }
        .log-success { color: var(--success); } .log-error { color: var(--danger); }
        .log-info { color: var(--accent); } .log-warn { color: var(--warn); }

        /* Progress */
        .progress-wrap { display: none; margin-top: 16px; }
        .progress-label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; display: flex; justify-content: space-between; }
        .progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; width: 0%; transition: width 0.3s ease; box-shadow: 0 0 8px var(--accent); }

        @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        footer { text-align: center; margin-top: 32px; font-size: 11px; color: var(--text-dim); }
        footer span { color: var(--accent); }
    </style>
</head>
<body>
    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>
    <div class="wrapper">
        <header>
            <div class="header-tag">&#9889; Nexu Stable Engine v2.0</div>
            <h1>GitHub Deployer Pro</h1>
            <p class="subtitle">Deploy ZIP ke GitHub Repository &mdash; tanpa CLI</p>
        </header>
        <div class="card">
            <div class="card-header">
                <div class="card-header-dots">
                    <div class="dot dot-r"></div>
                    <div class="dot dot-y"></div>
                    <div class="dot dot-g"></div>
                </div>
                <span class="card-title">Console Management</span>
            </div>
            <div class="card-body">

                <div id="statusBar" class="status-bar loading">
                    <div class="status-dot"></div>
                    <span id="statusText">Klik tombol refresh untuk connect...</span>
                </div>

                <div class="form-group">
                    <div class="form-label"><div class="form-label-dot"></div>Repository</div>
                    <div class="repo-row">
                        <select id="repoList"><option>-- belum connect --</option></select>
                        <button class="btn-refresh" id="refreshBtn" onclick="connect()" title="Connect / Refresh repos">&#8635;</button>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-label"><div class="form-label-dot"></div>File ZIP</div>
                    <input type="file" id="zipInput" accept=".zip">
                </div>

                <button class="btn btn-deploy" id="deployBtn" onclick="startDeploy()" disabled>
                    &#9889; Deploy Now
                </button>

                <div class="progress-wrap" id="progressWrap">
                    <div class="progress-label">
                        <span id="progressLabel">Uploading...</span>
                        <span id="progressPct">0%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                </div>

                <div id="log">
                    <div class="log-header"><div class="log-dot"></div>Deploy Log</div>
                    <div id="log-body"></div>
                </div>

            </div>
        </div>
        <footer>Made with <span>&#9829;</span> &middot; GitHub Deployer &middot; Nexu Engine</footer>
    </div>

    <script>
        // =============================================
        // GANTI TOKEN DI BAWAH INI
        // =============================================
        const TOKEN = "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";
        // =============================================

        function setStatus(text, type) {
            const bar = document.getElementById("statusBar");
            bar.className = "status-bar " + type;
            document.getElementById("statusText").textContent = text;
        }

        function writeLog(text, type) {
            type = type || "info";
            const log = document.getElementById("log");
            const body = document.getElementById("log-body");
            log.style.display = "block";
            const line = document.createElement("div");
            line.className = "log-line";
            const prefix = document.createElement("span");
            prefix.className = "log-prefix";
            prefix.textContent = "›";
            const msg = document.createElement("span");
            msg.className = "log-" + type;
            msg.textContent = text;
            line.appendChild(prefix);
            line.appendChild(msg);
            body.appendChild(line);
            body.scrollTop = body.scrollHeight;
        }

        function setProgress(pct, label) {
            document.getElementById("progressWrap").style.display = "block";
            document.getElementById("progressBar").style.width = pct + "%";
            document.getElementById("progressPct").textContent = pct + "%";
            if (label) document.getElementById("progressLabel").textContent = label;
        }

        async function getBase64(data) {
            return new Promise(function(resolve) {
                const reader = new FileReader();
                reader.onload = function(e) { resolve(window.btoa(e.target.result)); };
                reader.readAsBinaryString(new Blob([data]));
            });
        }

        async function connect() {
            if (!TOKEN || TOKEN === "TOKEN_KAMU_DISINI") {
                setStatus("Token belum diisi di kode!", "error");
                return;
            }

            const refreshBtn = document.getElementById("refreshBtn");
            refreshBtn.classList.add("spinning");
            refreshBtn.disabled = true;
            setStatus("Connecting...", "loading");
            document.getElementById("deployBtn").disabled = true;

            try {
                const res = await fetch("https://api.github.com/user", {
                    headers: { "Authorization": "token " + TOKEN }
                });
                if (!res.ok) throw new Error("Token tidak valid!");
                const user = await res.json();

                const reposRes = await fetch("https://api.github.com/user/repos?per_page=100&sort=updated", {
                    headers: { "Authorization": "token " + TOKEN }
                });
                const repos = await reposRes.json();

                document.getElementById("repoList").innerHTML = repos
                    .map(function(r) { return '<option value="' + r.full_name + '">' + r.full_name + '</option>'; })
                    .join("");

                setStatus("Connected as " + user.login, "ok");
                document.getElementById("deployBtn").disabled = false;
            } catch(e) {
                setStatus("Error: " + e.message, "error");
            } finally {
                refreshBtn.classList.remove("spinning");
                refreshBtn.disabled = false;
            }
        }

        async function startDeploy() {
            const repo = document.getElementById("repoList").value;
            const file = document.getElementById("zipInput").files[0];
            if (!file) return alert("Pilih file ZIP dulu!");

            const btn = document.getElementById("deployBtn");
            btn.disabled = true;
            btn.textContent = "Deploying...";
            document.getElementById("log-body").innerHTML = "";
            document.getElementById("progressWrap").style.display = "none";
            document.getElementById("progressBar").style.width = "0%";

            try {
                writeLog("Fetching repo info...", "info");
                const repoRes = await fetch("https://api.github.com/repos/" + repo, {
                    headers: { "Authorization": "token " + TOKEN }
                });
                const repoInfo = await repoRes.json();
                const branch = repoInfo.default_branch;
                writeLog("Branch: " + branch, "warn");

                const branchRes = await fetch("https://api.github.com/repos/" + repo + "/branches/" + branch, {
                    headers: { "Authorization": "token " + TOKEN }
                });
                const branchInfo = await branchRes.json();
                const parentSha = branchInfo.commit.sha;

                writeLog("Extracting ZIP...", "info");
                const arrayBuffer = await file.arrayBuffer();
                const zip = await JSZip.loadAsync(arrayBuffer);
                const files = Object.keys(zip.files).filter(function(k) { return !zip.files[k].dir; });

                const firstFolder = files[0].split("/")[0];
                const isNested = files.every(function(f) { return f.startsWith(firstFolder + "/"); });
                writeLog("Found " + files.length + " files", "warn");

                const tree = [];
                for (let i = 0; i < files.length; i++) {
                    const f = files[i];
                    setProgress(Math.round(((i + 1) / files.length) * 70), "Uploading " + (i+1) + "/" + files.length);
                    writeLog("Blob: " + f, "info");

                    const content = await zip.files[f].async("uint8array");
                    const b64 = await getBase64(content);

                    const blobRes = await fetch("https://api.github.com/repos/" + repo + "/git/blobs", {
                        method: "POST",
                        headers: { "Authorization": "token " + TOKEN, "Content-Type": "application/json" },
                        body: JSON.stringify({ content: b64, encoding: "base64" })
                    });
                    const blob = await blobRes.json();
                    const githubPath = isNested ? f.substring(f.indexOf("/") + 1) : f;
                    if (!githubPath) continue;
                    tree.push({ path: githubPath, mode: "100644", type: "blob", sha: blob.sha });
                }

                setProgress(80, "Creating tree...");
                writeLog("Creating git tree...", "info");
                const treeRes = await fetch("https://api.github.com/repos/" + repo + "/git/trees", {
                    method: "POST",
                    headers: { "Authorization": "token " + TOKEN, "Content-Type": "application/json" },
                    body: JSON.stringify({ tree: tree })
                });
                const newTree = await treeRes.json();

                setProgress(90, "Creating commit...");
                writeLog("Creating commit...", "info");
                const commitRes = await fetch("https://api.github.com/repos/" + repo + "/git/commits", {
                    method: "POST",
                    headers: { "Authorization": "token " + TOKEN, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Deploy via GitHub Deployer Pro",
                        tree: newTree.sha,
                        parents: [parentSha]
                    })
                });
                const commit = await commitRes.json();

                setProgress(95, "Updating branch...");
                writeLog("Updating branch ref...", "info");
                await fetch("https://api.github.com/repos/" + repo + "/git/refs/heads/" + branch, {
                    method: "PATCH",
                    headers: { "Authorization": "token " + TOKEN, "Content-Type": "application/json" },
                    body: JSON.stringify({ sha: commit.sha, force: true })
                });

                setProgress(100, "Done!");
                writeLog("DEPLOY SUCCESS!", "success");
                writeLog("Commit: " + commit.sha.substring(0, 7), "success");
                btn.textContent = "Deployed!";
                setTimeout(function() { btn.textContent = "Deploy Now"; btn.disabled = false; }, 3000);

            } catch(e) {
                writeLog("ERROR: " + e.message, "error");
                btn.textContent = "Deploy Now";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
